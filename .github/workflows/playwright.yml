name: Playwright Tests

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  schedule:
    - cron: '30 22 * * *'  # 4 AM IST daily
  workflow_dispatch:

jobs:
  smoke-tests:
    name: Smoke Tests
    timeout-minutes: 30
    runs-on: ubuntu-latest
    env:
      TEAMS_WEBHOOK_URL: ${{ secrets.TEAMS_WEBHOOK_URL }}
      PLAYWRIGHT_REPORT_URL: ${{ secrets.PLAYWRIGHT_REPORT_URL }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
      - name: Install dependencies
        run: npm ci
      - name: Install Playwright Browsers
        run: npx playwright install --with-deps
      - name: Run Smoke Tests
        id: smoke
        run: npx playwright test --grep @smoke --reporter=html
      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: smoke-report
          path: playwright-report/
          retention-days: 30

  regression-tests:
    name: Regression Tests
    needs: smoke-tests
    if: success()  # Runs only if smoke-tests pass
    timeout-minutes: 60
    runs-on: ubuntu-latest
    env:
      TEAMS_WEBHOOK_URL: ${{ secrets.TEAMS_WEBHOOK_URL }}
      PLAYWRIGHT_REPORT_URL: ${{ secrets.PLAYWRIGHT_REPORT_URL }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
      - name: Install dependencies
        run: npm ci
      - name: Install Playwright Browsers
        run: npx playwright install --with-deps
      - name: Run Regression Tests
        run: npx playwright test --grep @regression --reporter=html
      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: regression-report
          path: playwright-report/
          retention-days: 30